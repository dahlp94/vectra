services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: vectra-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vectra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vectra}
      POSTGRES_DB: ${POSTGRES_DB:-vectra}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - vectra_pgdata:/var/lib/postgresql/data
      - ./sql/init_pgvector.sql:/docker-entrypoint-initdb.d/10-init-pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vectra} -d ${POSTGRES_DB:-vectra}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  vectra_pgdata:
